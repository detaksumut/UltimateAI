<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UltimateAI - Starting</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e1e2f, #2d2d44);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #444;
      -webkit-app-region: drag;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    p {
      margin: 0;
      font-size: 14px;
      color: #aaa;
    }
    #status {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
      background: rgba(0,0,0,0.2);
      padding: 4px 12px;
      border-radius: 12px;
    }
    .loader {
      margin-top: 30px;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>UltimateAI</h1>
  <p>Helping Researchers Build, Not Code.</p>
  <div class="loader"></div>
  <div id="status">Initializing...</div>

  <script>
    if (window.ultimateAI && window.ultimateAI.onStatus) {
      window.ultimateAI.onStatus((status) => {
        document.getElementById('status').innerText = status;
      });
    }
  </script>
</body>
</html>
